name: "Deploy to Coolify via GitHub Container Registry"
description: "Deploy Docker images to Coolify via GitHub Container Registry"
author: "Assaf Arkin"

inputs:
  coolify-url:
    description: "Coolify instance URL (e.g., https://coolify.example.com)"
    required: true
  app-name:
    description: "Coolify application name"
    required: true
  image:
    description: "Docker image name (e.g., ghcr.io/org/app:latest)"
    required: true
  coolify-token:
    description: "Coolify API token"
    required: true
  env-vars:
    description: "Environment variables in dotenv format"
    required: false
  healthcheck-path:
    description: "Healthcheck path (default: /)"
    required: false
    default: "/"
  healthcheck-timeout:
    description: "Healthcheck timeout in seconds (default: 60)"
    required: false
    default: "60"
  context:
    description: "Docker build context path"
    required: false
    default: "."

outputs:
  deployment-uuid:
    description: "UUID of the deployment"
  healthcheck-url:
    description: "Full URL of the verified healthcheck endpoint"

runs:
  using: "node20"
  main: "dist/index.js"

branding:
  icon: "upload"
  color: "blue"
